name: Deploy SchluggiBot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Uberspace via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.UBERSPACE_SSH_KEY }}
          script: |
            cd ~/schluggibot || exit 1

            git reset --hard
            git pull origin main

            echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
            echo "DISCORD_CHANNEL_ID=${{ secrets.DISCORD_CHANNEL_ID }}" >> .env
            echo "YOUTUBE_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID }}" >> .env
            echo "WELCOME_ROLE_ID=${{ secrets.WELCOME_ROLE_ID }}" >> .env
            echo "LANGUAGE=${{ secrets.LANGUAGE }}" >> .env
            echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}" >> .env
            echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
            echo "SPOTIFY_ARTIST_ID=${{ secrets.SPOTIFY_ARTIST_ID }}" >> .env

            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt || echo "Einige Pakete konnten nicht installiert werden, fahre trotzdem fort..."

            supervisorctl restart schluggibot